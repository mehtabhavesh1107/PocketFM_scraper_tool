name: PocketFM Commissioning CI

on:
  push:
  pull_request:

jobs:
  backend-and-frontend:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: .
    env:
      COMMISSIONING_DATA_DIR: ${{ runner.temp }}\pocketfm-data
      COMMISSIONING_GENERATED_DIR: ${{ runner.temp }}\pocketfm-generated
      COMMISSIONING_DATABASE_URL: sqlite:///${{ runner.temp }}/pocketfm-data/commissioning.db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: py -m pip install -r backend\requirements.txt

      - name: Run backend tests
        run: py -m unittest discover -s backend\tests -v

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend smoke test
        working-directory: frontend
        run: npm run build
