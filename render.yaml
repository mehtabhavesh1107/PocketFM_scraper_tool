services:
  - type: web
    name: pocketfm-scraper-tool
    runtime: docker
    plan: free
    region: singapore
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: COMMISSIONING_DATABASE_URL
        fromDatabase:
          name: pocketfm-scraper-db
          property: connectionString
      - key: COMMISSIONING_ALLOWED_ORIGINS
        value: "*"
      - key: COMMISSIONING_JOB_WORKERS
        value: "2"
      - key: AMAZON_DETAIL_WORKERS
        value: "4"
      - key: AMAZON_REQUEST_TIMEOUT_SECONDS
        value: "12"
      - key: AMAZON_REQUEST_RETRIES
        value: "0"
      - key: AMAZON_DETAIL_RETRY_ROUNDS
        value: "0"
      - key: COMMISSIONING_DISABLE_PLAYWRIGHT_FALLBACK
        value: "1"
      - key: GOODREADS_LOOKUP_WORKERS
        value: "2"
      - key: GOODREADS_REQUEST_DELAY_SECONDS
        value: "1.5"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /ms-playwright

databases:
  - name: pocketfm-scraper-db
    plan: free
    region: singapore
    databaseName: pocketfm
    user: pocketfm
